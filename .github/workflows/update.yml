name: Mise a jour automatique du site

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Installer les outils
        run: pip install feedparser
      - name: Lancer le bot
        run: python bot_hopital.py
      - name: Publier les changements
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m "Mise a jour des alertes" || exit 0
          git push
