name: Mise a jour automatique du site

on:
  schedule:
    - cron: '0 8 * * *' # Se lance tous les jours à 8h du matin
  workflow_dispatch:      # Permet de le lancer à la main quand on veut

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Installer Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'
      - name: Installer les outils
        run: pip install feedparser
      - name: Lancer le bot
        run: python bot_hopital.py
      - name: Publier les changements
        run: |
          git config --global user.name 'Bot-Cyber'
          git config --global user.email 'bot@cyber.com'
          git add index.html
          git commit -m "Mise a jour des alertes" || exit 0
          git push
